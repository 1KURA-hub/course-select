<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>选课系统</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="auth-page">
  <div class="bg-glow"></div>
  <main class="auth-layout">
    <section class="hero card">
      <span class="badge">选课系统</span>
      <h1>欢迎使用选课系统</h1>
      <p class="muted">登录后可查看课程、一键抢课并实时查询结果。</p>
      <a class="ghost-link" href="/home">已有登录态，直接进入主页</a>
    </section>

    <section class="card auth-card">
      <div class="tabs">
        <button id="tab-login" class="tab active" type="button">登录</button>
        <button id="tab-register" class="tab" type="button">注册</button>
      </div>

      <form id="login-form" class="form active">
        <input id="login-sid" type="text" placeholder="学号 sid" required />
        <input id="login-password" type="password" placeholder="密码" required />
        <button type="submit">登录并进入主页</button>
      </form>

      <form id="register-form" class="form">
        <input id="register-sid" type="text" placeholder="学号 sid" required />
        <input id="register-name" type="text" placeholder="姓名" required />
        <input id="register-password" type="password" placeholder="密码" required />
        <button type="submit">注册账号</button>
      </form>

      <p id="auth-message" class="message"></p>
    </section>
  </main>

  <script src="/static/auth.js"></script>
</body>
</html>
