<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>选课系统</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="home-page">
  <div class="bg-glow"></div>
  <main class="container">
    <header class="card topbar">
      <div>
        <span class="badge">选课系统</span>
        <h1>课程主页</h1>
      </div>
      <div class="row">
        <span id="user-info" class="muted">未登录</span>
        <button id="logout-btn" type="button" class="danger">退出登录</button>
      </div>
    </header>

    <section class="card">
      <div class="row between">
        <h2>课程列表</h2>
        <button id="refresh-btn" type="button">刷新</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>名称</th>
            <th>库存</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="course-body"></tbody>
      </table>
    </section>

    <section class="card">
      <h2>选课结果（自动查询）</h2>
      <p class="muted">点击“抢课”后会自动查询结果，这里可手动补查。</p>
      <form id="result-form" class="row">
        <input id="result-course-id" type="number" min="1" placeholder="课程ID" required />
        <button type="submit">手动查询</button>
      </form>
      <p id="result-text" class="muted status-text">暂无结果</p>
    </section>

    <p id="message" class="message"></p>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
